name: Validate Skills

on:
  pull_request:
    paths: &validate_paths
      - 'skills/**'
      - '.github/workflows/validate-skills.yml'
      - 'validate-all.sh'
      - 'validate-skill.sh'
      - 'utils/validation/validate-skills.sh'
  push:
    branches: [main]
    paths: *validate_paths

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify validation scripts exist
        run: |
          test -f validate-all.sh
          test -f validate-skill.sh
          test -f utils/validation/validate-skills.sh

      - name: Validate all skills
        run: bash ./validate-all.sh --strict
